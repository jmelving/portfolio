<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">

  <!-- Title + SEO meta tags are injected by main.js from data.js -->
  <title>Curiosities</title>
  <link rel="icon" href="../img/favicon.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/curiosities.css">
</head>
<body>

<!-- ── BACKGROUND FX ── -->
<div id="grain"></div>
<canvas id="bg-canvas"></canvas>
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<!-- ── SIDE RAIL — populated by main.js ── -->
<nav id="side-rail"></nav>

<!-- ── HEADER — populated by main.js ── -->
<header></header>

<!-- ── MAIN CONTENT — populated by main.js ── -->
<div class="page-content" id="main-content"></div>

<!-- ── LIGHTBOX — static shell, wired up by main.js ── -->
<div id="lightbox">
  <button id="lb-close">
    <svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
  </button>
  <div id="lb-stage">
    <button class="lb-arrow" id="lb-prev">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="lb-media-wrap"></div>
    <button class="lb-arrow" id="lb-next">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>
  <div id="lb-counter"></div>
  <div id="lb-caption">
    <div id="lb-dots"></div>
    <div id="lb-title-wrap">
      <div id="lb-title"></div>
      <div id="lb-sub"></div>
      <div id="lb-desc"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     SCRIPTS  —  load order matters:
     1. data.js  → defines CURIOSITIES_DATA
     2. main.js  → reads it and builds everything
     ══════════════════════════════════════════════ -->
<script src="./curiosities.data.js"></script>
<script src="../js/curiosities.js"></script>

</body>
</html>
